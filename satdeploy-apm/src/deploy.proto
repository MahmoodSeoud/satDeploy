// Protocol buffer definitions for satdeploy CSP deploy commands
// These messages are exchanged between the ground station (satdeploy)
// and the satellite (satdeploy-agent) over CSP port 20.

syntax = "proto3";

package satdeploy;

// Command types for the deploy protocol
enum DeployCommand {
    CMD_UNKNOWN = 0;
    CMD_STATUS = 1;        // Query agent status, list deployed apps
    CMD_DEPLOY = 2;        // (Legacy) Deploy via DTP download
    CMD_ROLLBACK = 3;      // Restore previous version
    CMD_LIST_VERSIONS = 4; // List available backups for an app
    CMD_LOGS = 5;          // Fetch service logs from target
    CMD_UPLOAD_START = 6;  // Start direct file upload (sends metadata)
    CMD_UPLOAD_CHUNK = 7;  // File data chunk
    CMD_UPLOAD_END = 8;    // End upload and trigger install
}

// Request message sent from ground to satellite
message DeployRequest {
    DeployCommand command = 1;

    // App identification
    string app_name = 2;
    string param_name = 3;     // e.g., "mng_dipp"

    // CSP node addresses
    uint32 appsys_node = 4;    // a53-app-sys-manager node (e.g., 5421)
    uint32 run_node = 5;       // Node where app runs (e.g., 5423 for DIPP)

    // File paths
    string remote_path = 6;    // Installation path on satellite (e.g., /usr/bin/dipp)

    // DTP transfer parameters
    uint32 dtp_server_node = 7;  // Ground station CSP node address
    uint32 dtp_server_port = 8;  // DTP server port (typically 7)
    uint32 payload_id = 9;       // DTP payload identifier
    uint32 expected_size = 10;   // Expected file size in bytes
    string expected_checksum = 11; // Expected SHA256 checksum (full 64 hex chars)

    // For rollback command
    string rollback_hash = 12;  // Specific backup hash to restore (optional)

    // For direct upload (CMD_UPLOAD_START, CMD_UPLOAD_CHUNK, CMD_UPLOAD_END)
    uint32 chunk_seq = 13;      // Chunk sequence number (0-based)
    uint32 total_chunks = 14;   // Total number of chunks
    bytes chunk_data = 15;      // File data chunk (max ~1500 bytes per chunk)

    // For CMD_LOGS
    uint32 log_lines = 16;         // Number of log lines to fetch (default: 100)

    // Source file permission mode (e.g., 0755, 0644). 0 = use default (0755).
    uint32 file_mode = 17;
}

// Backup information returned by CMD_LIST_VERSIONS
message BackupEntry {
    string version = 1;      // Version string (e.g., "20250115-143022-a1b2c3d4")
    string timestamp = 2;    // Human-readable timestamp
    string hash = 3;         // File hash
    string path = 4;         // Full path to backup file
}

// App status information returned by CMD_STATUS
message AppStatusEntry {
    string app_name = 1;
    bool running = 2;
    string file_hash = 3;
    string remote_path = 4;
}

// Response message sent from satellite to ground
message DeployResponse {
    bool success = 1;
    uint32 error_code = 2;
    string error_message = 3;

    // For CMD_STATUS
    repeated AppStatusEntry apps = 4;

    // For CMD_LIST_VERSIONS
    repeated BackupEntry backups = 5;

    // For CMD_LOGS
    string log_output = 6;

    // For CMD_DEPLOY
    string backup_path = 7;
}

// Error codes
enum DeployError {
    ERR_NONE = 0;
    ERR_UNKNOWN_COMMAND = 1;
    ERR_APP_NOT_FOUND = 2;
    ERR_PARAM_SET_FAILED = 3;
    ERR_BACKUP_FAILED = 4;
    ERR_DTP_DOWNLOAD_FAILED = 5;
    ERR_CHECKSUM_MISMATCH = 6;
    ERR_INSTALL_FAILED = 7;
    ERR_NO_BACKUPS = 8;
    ERR_BACKUP_NOT_FOUND = 9;
    ERR_RESTORE_FAILED = 10;
    ERR_UPLOAD_IN_PROGRESS = 11;
    ERR_NO_UPLOAD_IN_PROGRESS = 12;
    ERR_CHUNK_OUT_OF_ORDER = 13;
    ERR_FILE_WRITE_FAILED = 14;
    ERR_LOGS_FAILED = 15;
}
